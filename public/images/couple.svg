<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9e2d0"/>
      <stop offset="60%" stop-color="#f0e8d5"/>
      <stop offset="100%" stop-color="#dccfae"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9c79f"/>
      <stop offset="100%" stop-color="#b59a6a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#sky)"/>
  <rect y="560" width="600" height="240" fill="url(#sand)"/>
  <ellipse cx="300" cy="558" rx="220" ry="6" fill="#0e2a4c" opacity="0.05"/>
  <!-- two stylised figures -->
  <g fill="#0e2a4c" opacity="0.85">
    <ellipse cx="240" cy="380" rx="34" ry="38"/>
    <path d="M204 420 q 36 -10 72 0 l 8 100 q -44 12 -88 0 z"/>
    <path d="M212 520 q 28 8 56 0 l 4 80 q -32 6 -64 0 z"/>
    <ellipse cx="360" cy="375" rx="36" ry="40"/>
